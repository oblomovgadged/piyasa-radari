name: Kayitdisi AI Ozetleyici

on:
  schedule:
    # Pazartesi(1), Çarşamba(3), Cuma(5) günleri saat 19:00 UTC (TSİ 22:00) çalışır
    - cron: '0 19 * * 1,3,5'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Python Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Kutuphaneleri Yukle
        run: pip install youtube-transcript-api google-generativeai
        
      - name: Robotu Calistir
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python ozet_botu.py
        
      - name: Degisiklikleri Kaydet
        run: |
          git config --global user.name 'AI-Bot'
          git config --global user.email 'bot@github.com'
          git add ozet.json
          git commit -m "AI Özeti Güncellendi" || echo "Değişiklik yok"
          git push
